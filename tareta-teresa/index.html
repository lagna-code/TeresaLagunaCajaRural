<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tarjeta Digital | Caja Rural</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0b6b3a">

    <style>
        :root {
            --green: #0b6b3a;
            --green-dark: #07542d;
            --green-soft: rgba(255,255,255,0.08);
            --white: #ffffff;
            --shadow: rgba(0, 0, 0, 0.18);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, var(--green) 0%, var(--green-dark) 100%);
            color: var(--white);
            overflow-x: hidden;
        }

        body.loaded {
            overflow: auto;
        }

        /* LOADER */
        .loader {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, var(--green) 0%, var(--green-dark) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        .loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-logo {
            width: 160px;
            max-width: 60vw;
            animation: pulseLogo 1.8s ease-in-out infinite;
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.18));
        }

        @keyframes pulseLogo {
            0%, 100% {
                transform: scale(1);
                opacity: 0.92;
            }
            50% {
                transform: scale(1.04);
                opacity: 1;
            }
        }

        /* CONTENIDO */
        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.9s ease, transform 0.9s ease;
            padding: 30px 22px 28px;
        }

        .page.show {
            opacity: 1;
            transform: translateY(0);
        }

        .top {
            padding-top: 18px;
        }

        .photo-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            animation: fadeUp 0.9s ease both;
            animation-delay: 0.15s;
        }

        .photo {
            width: 132px;
            height: 132px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255,255,255,0.85);
            box-shadow: 0 12px 30px rgba(0,0,0,0.20);
            transition: transform 0.35s ease, box-shadow 0.35s ease;
        }

        .photo:hover {
            transform: scale(1.03);
            box-shadow: 0 16px 36px rgba(0,0,0,0.24);
        }

        .name {
            font-size: 28px;
            font-weight: 700;
            line-height: 1.15;
            margin-bottom: 8px;
            animation: fadeUp 0.9s ease both;
            animation-delay: 0.3s;
        }

        .role {
            font-size: 16px;
            opacity: 0.92;
            animation: fadeUp 0.9s ease both;
            animation-delay: 0.45s;
            font-weight: 400;
            margin-top: 10px;
        }

        .buttons {
            margin-top: 38px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .buttons a {
            display: block;
            text-decoration: none;
            color: var(--white);
            background: var(--green-soft);
            border: 1px solid rgba(255,255,255,0.18);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 16px 18px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            box-shadow: 0 8px 22px rgba(0,0,0,0.10);
            transition:
                transform 0.25s ease,
                background 0.25s ease,
                border-color 0.25s ease,
                box-shadow 0.25s ease,
                color 0.25s ease;
            animation: fadeUp 0.8s ease both;
        }

        .buttons a:nth-child(1) { animation-delay: 0.6s; }
        .buttons a:nth-child(2) { animation-delay: 0.72s; }
        .buttons a:nth-child(3) { animation-delay: 0.84s; }
        .buttons a:nth-child(4) { animation-delay: 0.96s; }

        .buttons a:hover,
        .buttons a:focus {
            transform: translateY(-3px) scale(1.01);
            background: rgba(255,255,255,0.16);
            border-color: rgba(255,255,255,0.34);
            box-shadow: 0 14px 28px rgba(0,0,0,0.18);
            color: #ffffff;
        }

        .buttons a:active {
            transform: scale(0.98);
        }

        .footer {
            padding-top: 28px;
            animation: fadeUp 0.9s ease both;
            animation-delay: 1.05s;
        }

        .footer img {
            width: 170px;
            max-width: 58vw;
            object-fit: contain;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.14));
            transition: transform 0.3s ease;
        }

        .footer img:hover {
            transform: translateY(-2px);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 420px) {
            .page {
                padding: 24px 18px 24px;
            }

            .name {
                font-size: 24px;
            }

            .role {
                font-size: 15px;
            }

            .buttons a {
                font-size: 15px;
                padding: 15px 16px;
            }

            .photo {
                width: 118px;
                height: 118px;
            }
        }

        @media (min-height: 800px) {
            .top {
                padding-top: 30px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation: none !important;
                transition: none !important;
                scroll-behavior: auto !important;
            }

            .loader {
                display: none;
            }

            .page {
                opacity: 1;
                transform: none;
            }
        }
    </style>
</head>
<body>

    <!-- PANTALLA DE CARGA -->
    <div class="loader" id="loader">
        <img src="logo-caja-rural-jaen.png" alt="Caja Rural" class="loader-logo">
    </div>

    <!-- CONTENIDO -->
    <main class="page" id="page">
        <section class="top">
            <div class="photo-wrap">
                <img src="foto-empleado.jpg" alt="Foto de perfil" class="photo">
            </div>

            <h1 class="name">Teresa Laguna Porcuna</h1>
            <p class="role">Gestor comercial de la unidad NPLs Recuperaciones</p>
            <p class="role">Recuperaciones</p>

            <div class="buttons">
                <a href="https://www.linkedin.com/in/teresalaguna?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=ios_app" target="_blank" rel="noopener noreferrer">LinkedIn</a>
                <a href="https://www.instagram.com/cajaruraldejaen?igsh=cGltdHBuNTRvM2U1" target="_blank" rel="noopener noreferrer">Instagram</a>
                <a href="mailto:Teresa.laguna@crjaen.com">Correo electrónico</a>
                <a href="tel:+34608752662">Teléfono</a>
            </div>
        </section>

        <footer class="footer">
            <img src="logo-caja-rural-jaen.png" alt="Logo Caja Rural de Jaén">
        </footer>
    </main>

    <script>
        window.addEventListener('load', function () {
            const loader = document.getElementById('loader');
            const page = document.getElementById('page');

            setTimeout(() => {
                loader.classList.add('hidden');
                page.classList.add('show');
                document.body.classList.add('loaded');
            }, 1400);
        });
    </script>

</body>
</html>
